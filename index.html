<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator Beta</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; opacity: 0.9; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .result-area {
            margin-top: 20px;
            min-height: 300px;
            border: 2px dashed #334155;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #outputImage {
            max-width: 100%;
            display: none;
            border-radius: 10px;
            animation: fadeIn 0.5s ease-in;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .status-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Generator</h1>
    
    <div class="input-group">
        <input type="text" id="promptInput" placeholder="Опишите картинку (на англ.)...">
        <button id="generateBtn">Создать</button>
    </div>

    <div class="result-area">
        <div class="loader" id="loader"></div>
        <div id="placeholderText">Здесь появится результат работы ИИ</div>
        <img src="" id="outputImage" alt="Generated result">
        <div class="status-tag" id="aiTag">Generated by AI</div>
    </div>
</div>

<script>
    const btn = document.getElementById('generateBtn');
    const input = document.getElementById('promptInput');
    const img = document.getElementById('outputImage');
    const loader = document.getElementById('loader');
    const placeholder = document.getElementById('placeholderText');
    const aiTag = document.getElementById('aiTag');

    btn.addEventListener('click', () => {
        const prompt = input.value.trim();
        if (!prompt) return alert('Введите описание!');

        // Подготовка интерфейса
        btn.disabled = true;
        btn.innerText = 'Генерация...';
        loader.style.display = 'block';
        placeholder.style.display = 'none';
        img.style.display = 'none';
        aiTag.style.display = 'none';

        // Создаем уникальный URL для генерации (добавляем random для исключения кэша)
        const encodedPrompt = encodeURIComponent(prompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=500&height=500&nologo=true&seed=${Math.floor(Math.random() * 1000)}`;

        // Создаем новый объект изображения для предзагрузки
        const tempImg = new Image();
        tempImg.src = imageUrl;

        tempImg.onload = () => {
            img.src = imageUrl;
            img.style.display = 'block';
            loader.style.display = 'none';
            aiTag.style.display = 'block';
            btn.disabled = false;
            btn.innerText = 'Создать';
        };

        tempImg.onerror = () => {
            alert('Ошибка при генерации. Попробуйте другой запрос.');
            btn.disabled = false;
            btn.innerText = 'Создать';
            loader.style.display = 'none';
            placeholder.style.display = 'block';
        };
    });

    // Позволяет нажимать Enter
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btn.click();
    });
</script>

</body>
</html>
