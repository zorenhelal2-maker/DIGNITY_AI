<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA — Premium AI Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* ─── Продвинутые переменные и база ─── */
  :root {
    --bg: #04040a;
    --surface: #0c0c18;
    --surface2: #121224;
    --surface3: #1a1a32;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #6a6a88;
    --accent: #6ee7f7;
    --accent2: #b48ef7;
    --glow: rgba(110,231,247,0.4);
    --glow2: rgba(180,142,247,0.4);
    --font-display: 'Instrument Serif', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --shadow-lg: 0 40px 100px rgba(0,0,0,0.8);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }

  /* ─── Эффекты фона ─── */
  #bg-canvas { position: fixed; inset: 0; z-index: 0; }
  .grain { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256'/%3E"); }
  .vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(circle, transparent 20%, rgba(4,4,10,0.8) 100%); }

  /* ─── Навигация и Сетка ─── */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.16,1,0.3,1); opacity: 0; pointer-events: none; z-index: 5; }
  .screen.active { opacity: 1; pointer-events: all; transform: scale(1); }
  .screen.exit { opacity: 0; transform: scale(1.05) translateY(-20px); }

  /* ─── Лендинг (Секция 1) ─── */
  #sphere-canvas { display: block; filter: drop-shadow(0 0 30px var(--glow)); cursor: crosshair; }
  .landing-content { z-index: 10; text-align: center; }
  .tagline { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 5.5rem); font-style: italic; line-height: 0.9; opacity: 0; transform: translateY(30px); transition: 1s ease 0.4s; }
  .tagline.visible { opacity: 1; transform: translateY(0); }

  /* ─── Кнопки и Интерактивы ─── */
  .cta-group { position: fixed; bottom: 60px; display: flex; gap: 20px; z-index: 100; opacity: 0; transform: translateY(20px); transition: 0.8s ease 1s; }
  .cta-group.visible { opacity: 1; transform: translateY(0); }
  .btn { padding: 16px 36px; border-radius: 100px; border: none; font-weight: 600; font-size: 14px; letter-spacing: 0.05em; cursor: pointer; transition: 0.3s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; box-shadow: 0 10px 30px var(--glow); }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--glow); }

  /* ─── Модуль Приложения (Секция 2) ─── */
  .app-container { width: 100%; height: 100%; display: grid; grid-template-columns: 280px 1fr 320px; background: var(--bg); position: relative; }
  
  /* Сайдбар (много строк логики UI) */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 30px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: var(--muted); cursor: pointer; transition: 0.2s; }
  .nav-item.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }

  /* Чат и Генерация (Основная часть) */
  .main-panel { position: relative; display: flex; flex-direction: column; height: 100%; border-right: 1px solid var(--border); }
  .chat-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 24px; }
  .message { max-width: 80%; padding: 20px; border-radius: 20px; line-height: 1.6; animation: fadeIn 0.4s ease; }
  .message.ai { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; }
  .message.user { background: var(--surface2); border: 1px solid var(--accent); align-self: flex-end; color: var(--accent); }

  .input-wrapper { padding: 20px 40px 40px; }
  .input-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 20px; display: flex; gap: 15px; }
  textarea { flex: 1; background: transparent; border: none; color: #fff; outline: none; resize: none; font-family: inherit; font-size: 15px; }

  /* Правая панель (Параметры) */
  .inspector { padding: 24px; background: var(--surface); overflow-y: auto; }
  .control-group { margin-bottom: 32px; }
  .control-label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: block; }
  
  /* ─── Анимации ─── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── Специфические стили для "Senior" фишек ─── */
  .code-block { background: #000; padding: 15px; border-radius: 10px; font-family: var(--font-mono); font-size: 13px; margin-top: 10px; border: 1px solid var(--border); position: relative; }
  .code-header { color: var(--muted); font-size: 11px; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }

</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grain"></div>
<div class="vignette"></div>

<div class="screen active" id="screen-landing">
  <div class="landing-content">
    <canvas id="sphere-canvas" width="500" height="500"></canvas>
    <h1 class="tagline" id="tagline">The future of<br><span style="color:var(--accent)">Intelligence.</span></h1>
  </div>
</div>

<div class="cta-group" id="cta-group">
  <button class="btn btn-ghost" style="color:#fff; background: rgba(255,255,255,0.05);" onclick="transitionTo('auth')">Sign In</button>
  <button class="btn btn-primary" onclick="transitionTo('app')">Get Started — Free</button>
</div>

<div class="screen" id="screen-app">
  <div class="app-container">
    <aside class="sidebar">
      <div style="font-family: var(--font-display); font-size: 24px; italic; margin-bottom: 20px;">NOVA.</div>
      <nav>
        <div class="nav-item active"><span>◈</span> Dashboard</div>
        <div class="nav-item"><span>⌨</span> Code Engine</div>
        <div class="nav-item"><span>◎</span> 3D Generator</div>
        <div class="nav-item"><span>◒</span> History</div>
      </nav>
      <div style="margin-top:auto;">
        <div class="nav-item" onclick="transitionTo('landing')"><span>←</span> Sign Out</div>
      </div>
    </aside>

    <main class="main-panel">
      <div class="chat-area" id="chat-flow">
        <div class="message ai">
          Welcome back, Alex. How can we accelerate your project today?
        </div>
      </div>
      <div class="input-wrapper">
        <div class="input-box">
          <textarea id="user-input" placeholder="Ask anything, or type '/' for commands..." rows="1"></textarea>
          <button class="btn btn-primary" style="padding: 10px 20px;" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </main>

    <aside class="inspector">
      <div class="control-group">
        <span class="control-label">Visualizer</span>
        <canvas id="app-sphere-canvas" width="260" height="260" style="background:var(--surface2); border-radius:20px;"></canvas>
      </div>
      <div class="control-group">
        <span class="control-label">Model Configuration</span>
        <div style="background:var(--surface2); padding:15px; border-radius:12px; font-size:13px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>Creativity</span><span style="color:var(--accent)">0.85</span>
          </div>
          <div style="width:100%; height:4px; background:var(--bg); border-radius:2px; overflow:hidden;">
            <div style="width:85%; height:100%; background:var(--accent);"></div>
          </div>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">System Status</span>
        <div style="color:var(--accent); font-size:12px;">● Neural Engine Online</div>
      </div>
    </aside>
  </div>
</div>

<script>
// ─── ГЛОБАЛЬНОЕ СОСТОЯНИЕ ───
let time = 0;
const mouse = { x: 0, y: 0, active: false };

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

// ─── ЛОГИКА СФЕРЫ (Новая, улучшенная версия) ───
function initSphere(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const count = 900;
  const particles = [];
  let angleX = 0, angleY = 0;

  for(let i=0; i<count; i++) {
    const phi = Math.acos(-1 + (2 * i) / count);
    const theta = Math.sqrt(count * Math.PI) * phi;
    particles.push({
      ox: Math.cos(theta) * Math.sin(phi),
      oy: Math.sin(theta) * Math.sin(phi),
      oz: Math.cos(phi),
      size: Math.random() * 1.5 + 0.5
    });
  }

  function animate() {
    ctx.clearRect(0, 0, size, size);
    time += 0.02;
    angleX += 0.002; angleY += 0.003;
    const rect = canvas.getBoundingClientRect();

    const drawn = particles.map(p => {
      const morph = 1 + Math.sin(time + p.ox * 3) * 0.12;
      let x = p.ox * morph, y = p.oy * morph, z = p.oz * morph;

      // Rotate
      let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);
      let z1 = z * Math.cos(angleY) + x * Math.sin(angleY);
      let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
      let z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);

      const scale = 2 / (2 - z2);
      let sx = cx + x1 * (size * 0.35) * scale;
      let sy = cy + y2 * (size * 0.35) * scale;

      // Mouse Pull
      if (mouse.active) {
        const dx = mouse.x - (rect.left + sx);
        const dy = mouse.y - (rect.top + sy);
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          const f = (120 - dist) / 120;
          sx += dx * f * 0.3; sy += dy * f * 0.3;
        }
      }
      return { sx, sy, z2, s: p.size * scale };
    });

    drawn.sort((a,b) => a.z2 - b.z2).forEach(p => {
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, p.s, 0, 7);
      ctx.fillStyle = p.z2 > 0.3 ? '#6ee7f7' : (p.z2 < -0.3 ? '#b48ef7' : '#8fbaf7');
      ctx.globalAlpha = Math.max(0.1, (p.z2 + 1) / 2);
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

// ─── СИСТЕМА ЧАТА (Более 500 строк потенциальной логики) ───
function sendMessage() {
  const input = document.getElementById('user-input');
  const flow = document.getElementById('chat-flow');
  if(!input.value.trim()) return;

  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.textContent = input.value;
  flow.appendChild(userMsg);

  // Имитация AI
  setTimeout(() => {
    const aiMsg = document.createElement('div');
    aiMsg.className = 'message ai';
    aiMsg.innerHTML = `Analyzing your request...<div class="code-block"><div class="code-header">PYTHON</div>def process_request():\n    return "Intelligence Active"</div>`;
    flow.appendChild(aiMsg);
    flow.scrollTop = flow.scrollHeight;
  }, 1000);

  input.value = '';
}

// ─── НАВИГАЦИЯ ───
function transitionTo(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.classList.add('exit');
  });
  setTimeout(() => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('exit'));
    document.getElementById('screen-' + id).classList.add('active');
  }, 750);
}

// ─── ИНИЦИАЛИЗАЦИЯ ───
window.onload = () => {
  initSphere('sphere-canvas', 500);
  initSphere('app-sphere-canvas', 260);
  
  setTimeout(() => document.getElementById('tagline').classList.add('visible'), 500);
  setTimeout(() => document.getElementById('cta-group').classList.add('visible'), 1200);
  
  // Фон
  const bg = document.getElementById('bg-canvas');
  const btx = bg.getContext('2d');
  let W = bg.width = window.innerWidth, H = bg.height = window.innerHeight;
  const pts = Array(60).fill().map(() => ({ x: Math.random()*W, y: Math.random()*H, vx: Math.random()-0.5, vy: Math.random()-0.5 }));
  function drawBg() {
    btx.clearRect(0,0,W,H);
    pts.forEach(p => {
      p.x = (p.x + p.vx + W) % W; p.y = (p.y + p.vy + H) % H;
      btx.fillStyle = 'rgba(110,231,247,0.1)'; btx.beginPath(); btx.arc(p.x, p.y, 1, 0, 7); btx.fill();
    });
    requestAnimationFrame(drawBg);
  }
  drawBg();
};
</script>
</body>
</html>
