<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA — AI Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04040a;
    --surface: #0c0c18;
    --surface2: #121224;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #6a6a88;
    --accent: #6ee7f7;
    --accent2: #b48ef7;
    --glow: #6ee7f766;
    --glow2: #b48ef766;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
    user-select: none;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.7s ease, transform 0.7s ease;
    pointer-events: none;
    opacity: 0;
  }
  .screen.active { opacity: 1; pointer-events: all; }
  .screen.exit { opacity: 0; transform: scale(0.96); }

  #bg-canvas { position: fixed; inset: 0; z-index: 0; }

  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  .sphere-wrap { position: relative; z-index: 2; }
  #sphere-canvas { display: block; }

  .landing-tagline {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-style: italic;
    color: var(--text);
    text-align: center;
    margin-top: 32px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
  }
  .landing-tagline.visible { opacity: 1; transform: translateY(0); }

  .landing-sub {
    font-size: 13px; font-weight: 300; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-top: 10px; opacity: 0; transition: opacity 0.8s ease 0.6s;
  }
  .landing-sub.visible { opacity: 1; }

  .cta-group {
    position: fixed; bottom: 48px; display: flex; gap: 14px; z-index: 10;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .cta-group.visible { opacity: 1; transform: translateY(0); }

  .btn {
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    padding: 12px 28px; border-radius: 100px; border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
  .btn-primary {
    background: linear-gradient(135deg, #6ee7f7, #b48ef7); color: #04040a;
    font-weight: 600; box-shadow: 0 0 24px var(--glow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px var(--glow), 0 0 60px var(--glow2); }

  .auth-card {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 24px;
    padding: 40px; width: 380px; max-width: calc(100vw - 32px);
    backdrop-filter: blur(20px); box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  .auth-logo { font-family: var(--font-display); font-size: 22px; font-style: italic; text-align: center; margin-bottom: 6px; }
  .auth-mode-label { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 28px; text-transform: uppercase; }

  .auth-tabs { display: flex; background: var(--bg); border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
  .auth-tab { flex: 1; text-align: center; padding: 8px; font-size: 13px; border-radius: 9px; cursor: pointer; color: var(--muted); border: none; background: transparent; }
  .auth-tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; padding: 11px; color: var(--text); outline: none; }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,231,247,0.1); }

  .app-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 20px 28px; border-bottom: 1px solid var(--border); }
  .user-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); padding: 6px 12px; border-radius: 100px; border: 1px solid var(--border); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #6ee7f7, #b48ef7); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #04040a; }

  .mode-slider { display: flex; background: var(--surface); border: 1px solid var(--border2); border-radius: 100px; padding: 5px; position: relative; }
  .mode-slider-track { position: absolute; top: 5px; left: 5px; height: calc(100% - 10px); border-radius: 100px; background: rgba(110,231,247,0.15); border: 1px solid rgba(110,231,247,0.3); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .mode-btn { position: relative; z-index: 2; font-size: 13px; padding: 9px 22px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: color 0.3s; }
  .mode-btn.active { color: var(--accent); }

  .panel { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; opacity: 0; transform: translateX(30px); transition: all 0.4s ease; pointer-events: none; }
  .panel.active { opacity: 1; transform: translateX(0); pointer-events: all; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px; padding: 10px 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grain"></div>

<div class="screen active" id="screen-landing">
  <div class="sphere-wrap">
    <canvas id="sphere-canvas" width="320" height="320"></canvas>
  </div>
  <p class="landing-tagline" id="tagline">Create without limits.</p>
  <p class="landing-sub" id="sub">Powered by AI</p>
</div>

<div class="cta-group" id="cta-group">
  <button class="btn btn-ghost" onclick="showAuth('login')">Log in</button>
  <button class="btn btn-primary" onclick="showAuth('signup')">Create account</button>
</div>

<div class="screen" id="screen-auth">
  <div class="auth-card">
    <div class="auth-logo">NOVA</div>
    <div class="auth-mode-label" id="auth-mode-label">Welcome back</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Log in</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign up</button>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••"/>
    </div>
    <div class="field" id="field-name" style="display:none">
      <label>Your name</label>
      <input type="text" id="auth-name" placeholder="Alex"/>
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleAuth()">Continue</button>
    <div style="text-align:center; margin-top:15px; font-size:12px; color:var(--muted); cursor:pointer;" onclick="backToLanding()">← Back</div>
  </div>
</div>

<div class="screen" id="screen-app">
  <div class="app-header">
    <div class="app-logo">NOVA</div>
    <div class="mode-slider">
      <div class="mode-slider-track" id="slider-track"></div>
      <button class="mode-btn active" id="btn-3d" onclick="setMode('3d')">◈ 3D Model</button>
      <button class="mode-btn" id="btn-code" onclick="setMode('code')">⌨ Code</button>
    </div>
    <div class="user-badge">
      <div class="avatar" id="user-avatar">A</div>
      <span id="user-name-label">Alex</span>
    </div>
  </div>
  <div style="flex:1; width:100%; position:relative;">
    <div class="panel active" id="panel-3d">
      <canvas id="app-sphere-canvas" width="220" height="220"></canvas>
      <p style="margin-top:20px; color:var(--muted); font-size:14px;">Interactive 3D Preview Active</p>
    </div>
    <div class="panel" id="panel-code">
      <p>Code editor coming soon...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE & MOUSE ──────────────────────────────────────────────────
let currentMode = '3d';
let userName = 'Alex';
const mouse = { x: 0, y: 0, active: false };

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

// ─── EVOLVING SPHERE LOGIC ──────────────────────────────────────────
function createSphereRenderer(canvas, size) {
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const particleCount = 800; 
  const particles = [];
  let angleX = 0, angleY = 0, time = 0;
  let animId;

  for (let i = 0; i < particleCount; i++) {
    const phi = Math.acos(-1 + (2 * i) / particleCount);
    const theta = Math.sqrt(particleCount * Math.PI) * phi;
    particles.push({
      ox: Math.cos(theta) * Math.sin(phi),
      oy: Math.sin(theta) * Math.sin(phi),
      oz: Math.cos(phi),
      baseSize: Math.random() * 1.2 + 0.6
    });
  }

  function draw() {
    ctx.clearRect(0, 0, size, size);
    time += 0.015; angleX += 0.002; angleY += 0.004;
    const baseRadius = size * 0.38;
    const rect = canvas.getBoundingClientRect();

    const processed = particles.map(p => {
      // 1. Изменение формы (шум/пульсация)
      const noise = Math.sin(p.ox * 2 + time) * Math.cos(p.oy * 2 + time) * 0.15;
      const pulse = 1 + noise;

      // 2. Вращение
      let x = p.ox * pulse, y = p.oy * pulse, z = p.oz * pulse;
      let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);
      let z1 = z * Math.cos(angleY) + x * Math.sin(angleY);
      let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
      let z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);

      // 3. Проекция
      const scale = 1.8 / (1.8 - z2);
      let sx = cx + x1 * baseRadius * scale;
      let sy = cy + y2 * baseRadius * scale;

      // 4. Интерактив с мышью
      if (mouse.active) {
        const dx = mouse.x - (rect.left + sx);
        const dy = mouse.y - (rect.top + sy);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          const force = (100 - dist) / 100;
          sx += dx * force * 0.2;
          sy += dy * force * 0.2;
        }
      }
      return { sx, sy, z2, size: p.baseSize * scale };
    });

    processed.sort((a, b) => a.z2 - b.z2).forEach(p => {
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.z2 > 0.3 ? '#6ee7f7' : (p.z2 < -0.3 ? '#b48ef7' : '#8fbaf7');
      ctx.globalAlpha = Math.max(0.1, (p.z2 + 1.5) / 2.5);
      ctx.fill();
    });
    animId = requestAnimationFrame(draw);
  }
  return { start: () => animId = requestAnimationFrame(draw), stop: () => cancelAnimationFrame(animId) };
}

// ─── INITIALIZATION ─────────────────────────────────────────────────
const landingSphere = createSphereRenderer(document.getElementById('sphere-canvas'), 320);
landingSphere.start();
let appSphere = null;

// BG Particles
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function res() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', res); res();
  for(let i=0; i<50; i++) pts.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.2});
  function anim() {
    ctx.clearRect(0,0,W,H);
    pts.forEach(p => {
      p.x=(p.x+p.vx+W)%W; p.y=(p.y+p.vy+H)%H;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, 7); ctx.fillStyle = 'rgba(110,231,247,0.2)'; ctx.fill();
    });
    requestAnimationFrame(anim);
  }
  anim();
})();

// UI Logic
window.addEventListener('load', () => {
  setTimeout(() => { document.getElementById('tagline').classList.add('visible'); document.getElementById('sub').classList.add('visible'); }, 400);
  setTimeout(() => { document.getElementById('cta-group').classList.add('visible'); }, 1000);
});

function showAuth(m) { document.getElementById('cta-group').style.display='none'; switchAuthTab(m); transitionTo('auth'); }
function backToLanding() { document.getElementById('cta-group').style.display='flex'; transitionTo('landing'); }

function transitionTo(t) {
  const screens = { landing: 'screen-landing', auth: 'screen-auth', app: 'screen-app' };
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.add('exit'); setTimeout(() => cur.classList.remove('active', 'exit'), 700); }
  setTimeout(() => {
    document.getElementById(screens[t]).classList.add('active');
    if (t === 'app' && !appSphere) { appSphere = createSphereRenderer(document.getElementById('app-sphere-canvas'), 220); appSphere.start(); }
  }, 350);
}

function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('field-name').style.display = tab==='signup' ? 'block' : 'none';
}

function handleAuth() {
  const email = document.getElementById('auth-email').value;
  if(!email) return showToast("Enter email");
  userName = document.getElementById('auth-name').value || email.split('@')[0];
  document.getElementById('user-avatar').textContent = userName[0].toUpperCase();
  document.getElementById('user-name-label').textContent = userName;
  transitionTo('app');
}

function setMode(m) {
  if (m === currentMode) return;
  currentMode = m;
  const track = document.getElementById('slider-track');
  const b3 = document.getElementById('btn-3d'), bc = document.getElementById('btn-code');
  track.style.transform = m==='code' ? `translateX(${b3.offsetWidth}px)` : 'translateX(0)';
  track.style.width = (m==='code' ? bc.offsetWidth : b3.offsetWidth) + 'px';
  document.getElementById('panel-3d').classList.toggle('active', m==='3d');
  document.getElementById('panel-code').classList.toggle('active', m==='code');
}

function showToast(m) { 
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

window.addEventListener('load', () => {
  setTimeout(() => { document.getElementById('slider-track').style.width = document.getElementById('btn-3d').offsetWidth + 'px'; }, 100);
});
</script>
</body>
</html>
