<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Генератор изображений</title>
    <style>
        /* Современный темный фон с градиентом */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Эффект стекла для главного контейнера */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            background: linear-gradient(to right, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Стилизация поля ввода и кнопки */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #a855f7;
        }

        button {
            padding: 0 24px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        /* Зона отображения результата */
        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.3s;
        }

        .image-container.has-image {
            border: none;
            background: transparent;
        }

        #result-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border-radius: 16px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Анимация сканирования/загрузки */
        .scanner {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.2), transparent);
            animation: scan 1.5s linear infinite;
        }

        .placeholder-text {
            color: #64748b;
            font-size: 14px;
        }

        /* Значок "Нейросеть" */
        .badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #fbbf24;
            display: none;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>AI Vision</h1>
        <p class="subtitle">Введите описание на английском (например: <i>cyberpunk cat, neon lights</i>)</p>
        
        <div class="input-group">
            <input type="text" id="prompt" placeholder="Опишите, что вы хотите увидеть..." autocomplete="off">
            <button id="btn">Создать</button>
        </div>

        <div class="image-container" id="img-container">
            <div class="scanner" id="scanner"></div>
            <span class="placeholder-text" id="placeholder">Здесь появится магия ИИ ✨</span>
            <img id="result-image" src="" alt="Сгенерированное изображение">
            <div class="badge" id="badge">✦ AI Generated</div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const input = document.getElementById('prompt');
        const resultImage = document.getElementById('result-image');
        const scanner = document.getElementById('scanner');
        const placeholder = document.getElementById('placeholder');
        const container = document.getElementById('img-container');
        const badge = document.getElementById('badge');

        function generateImage() {
            const promptText = input.value.trim();
            
            if (!promptText) {
                // Визуальная подсказка об ошибке
                input.style.borderColor = '#ef4444';
                setTimeout(() => input.style.borderColor = 'rgba(255, 255, 255, 0.1)', 1000);
                return;
            }

            // Переводим UI в режим загрузки
            btn.disabled = true;
            btn.innerText = 'Нейросеть думает...';
            placeholder.style.display = 'none';
            resultImage.style.display = 'none';
            badge.style.display = 'none';
            scanner.style.display = 'block';
            container.classList.remove('has-image');

            // Формируем запрос к Pollinations
            // Добавляем случайный seed, чтобы при одинаковых запросах были разные картинки
            const encodedPrompt = encodeURIComponent(promptText);
            const randomSeed = Math.floor(Math.random() * 100000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true&seed=${randomSeed}`;

            // Загружаем картинку в фоновом режиме перед показом
            const imgLoad = new Image();
            imgLoad.src = imageUrl;

            imgLoad.onload = () => {
                // Показываем результат
                resultImage.src = imageUrl;
                resultImage.style.display = 'block';
                scanner.style.display = 'none';
                badge.style.display = 'block';
                container.classList.add('has-image');
                
                // Возвращаем кнопку в исходное состояние
                btn.disabled = false;
                btn.innerText = 'Создать';
            };

            imgLoad.onerror = () => {
                alert('Произошла ошибка при обращении к нейросети. Попробуйте другой запрос.');
                btn.disabled = false;
                btn.innerText = 'Создать';
                scanner.style.display = 'none';
                placeholder.style.display = 'block';
            };
        }

        // Запуск по клику на кнопку
        btn.addEventListener('click', generateImage);

        // Запуск по нажатию клавиши Enter
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                generateImage();
            }
        });
    </script>
</body>
</html>
